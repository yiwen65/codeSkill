$schema: "https://json-schema.org/draft/2020-12/schema"
title: Plan Task
required:
  - id
  - title
  - goal
  - files_touched
  - acceptance
  - test_plan
  - dependencies
  - risk
properties:
  id:
    type: string
  title:
    type: string
  goal:
    type: string
  files_touched:
    type: array
    items: { type: string }
  acceptance:
    type: array
    items: { type: string }
    minItems: 1
  test_plan:
    type: array
    items: { type: string }
    minItems: 1
  dependencies:
    type: array
    items: { type: string }
  risk:
    type: string
